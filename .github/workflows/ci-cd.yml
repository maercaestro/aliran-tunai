name: Backend CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:  # Allow manual triggering

env:
  PYTHON_VERSION: '3.12'

jobs:
  # ============= TESTING PHASE =============
  test-python:
    name: Test Python Backend
    runs-on: ubuntu-latest
    
    services:
      mongodb:
        image: mongo:7.0
        env:
          MONGO_INITDB_ROOT_USERNAME: testuser
          MONGO_INITDB_ROOT_PASSWORD: testpass
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --eval 'db.adminCommand(\"ping\")'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: ${{ env.PYTHON_VERSION }}
        
    - name: Cache Python dependencies
      uses: actions/cache@v3
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-
          
    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y tesseract-ocr tesseract-ocr-eng
        
    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest pytest-cov pytest-mock pytest-asyncio python-dotenv
        pip install flake8 black isort mypy bandit safety
        
    - name: Create test environment file
      run: |
        cat > .env.test << EOF
        MONGO_URI=mongodb://testuser:testpass@localhost:27017/test_db?authSource=admin
        TELEGRAM_BOT_TOKEN=test_token_for_ci
        OPENAI_API_KEY=test_openai_key
        WHATSAPP_VERIFY_TOKEN=test_verify_token
        WHATSAPP_ACCESS_TOKEN=test_access_token
        WHATSAPP_PHONE_NUMBER_ID=test_phone_id
        JWT_SECRET_KEY=test_jwt_secret_key
        
        # Personal Budget Feature Flags
        ENABLE_PERSONAL_BUDGET=true
        ENABLE_BUSINESS=true
        DEFAULT_MODE=personal
        ALLOW_MODE_SWITCHING=true
        
        FLASK_ENV=testing
        EOF
        
    - name: Run environment validation
      run: |
        echo "Running environment validation..."
        python scripts/validate_environment.py || echo "Environment validation completed with warnings"
        
    - name: Run code quality checks
      run: |
        echo "Running code formatting checks..."
        black --check . || echo "Code formatting issues found - fix with 'black .'"
        echo "Running import sorting checks..."
        isort --check-only . || echo "Import sorting issues found - fix with 'isort .'"
        echo "Running linting..."
        flake8 . --max-line-length=120 --extend-ignore=E203,W503 || echo "Linting issues found"
        
    - name: Run type checking
      run: |
        echo "Running type checking..."
        mypy . --ignore-missing-imports --no-strict-optional || echo "Type checking completed with issues"
        
    - name: Run security checks
      run: |
        echo "Running security analysis..."
        bandit -r . -f json -o bandit-report.json || true
        echo "Checking for vulnerabilities in dependencies..."
        safety check --json --output safety-report.json || true
        
    - name: Run unit tests with coverage
      run: |
        echo "Running unit tests..."
        pytest tests/ -v --cov=. --cov-report=xml --cov-report=html --cov-report=term || echo "Some tests failed"
      env:
        PYTHONPATH: .
        
    - name: Upload coverage reports
      uses: codecov/codecov-action@v3
      if: always()
      with:
        file: ./coverage.xml
        flags: backend
        name: backend-coverage
        fail_ci_if_error: false
        
    - name: Upload test artifacts
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: test-reports
        path: |
          htmlcov/
          bandit-report.json
          safety-report.json

  # ============= INTEGRATION TESTING =============
  integration-test:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: [test-python]
    
    services:
      mongodb:
        image: mongo:7.0
        env:
          MONGO_INITDB_ROOT_USERNAME: testuser
          MONGO_INITDB_ROOT_PASSWORD: testpass
        ports:
          - 27017:27017
          
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: ${{ env.PYTHON_VERSION }}
        
    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y tesseract-ocr
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest pytest-asyncio requests
        
    - name: Create integration test environment
      run: |
        cat > .env.integration << EOF
        MONGO_URI=mongodb://testuser:testpass@localhost:27017/integration_test_db?authSource=admin
        TELEGRAM_BOT_TOKEN=integration_test_token
        OPENAI_API_KEY=integration_test_key
        WHATSAPP_VERIFY_TOKEN=integration_verify_token
        WHATSAPP_ACCESS_TOKEN=integration_access_token
        WHATSAPP_PHONE_NUMBER_ID=integration_phone_id
        JWT_SECRET_KEY=integration_test_jwt_secret
        
        # Personal Budget Feature Flags
        ENABLE_PERSONAL_BUDGET=true
        ENABLE_BUSINESS=true
        DEFAULT_MODE=personal
        ALLOW_MODE_SWITCHING=true
        
        FLASK_ENV=testing
        EOF
        
    - name: Run integration tests
      run: |
        echo "Starting integration tests..."
        python -m pytest integration_tests/ -v || echo "Integration tests completed with some failures"
      env:
        PYTHONPATH: .

  # ============= DEPLOYMENT PHASE =============
  deploy:
    name: Deploy to GCloud
    runs-on: ubuntu-latest
    needs: [test-python, integration-test]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Authenticate to Google Cloud
      uses: google-github-actions/auth@v2
      with:
        credentials_json: ${{ secrets.GCP_SA_KEY }}

    - name: Set up gcloud CLI
      uses: google-github-actions/setup-gcloud@v2
      with:
        project_id: ${{ secrets.GCP_PROJECT_ID }}

    - name: Create deployment package
      run: |
        echo "Creating deployment package..."
        tar -czvf deployment-package.tar.gz \
          --exclude='.git' \
          --exclude='node_modules' \
          --exclude='__pycache__' \
          --exclude='.pytest_cache' \
          --exclude='htmlcov' \
          --exclude='*.log' \
          --exclude='.env*' \
          --exclude='venv' \
          --exclude='aliran' \
          --exclude='*.pyc' \
          --exclude='.DS_Store' \
          --exclude='*.tmp' \
          --exclude='*.temp' \
          .
        echo "✅ Deployment package created"
        ls -la deployment-package.tar.gz

    - name: Upload package to VM
      run: |
        gcloud compute scp deployment-package.tar.gz \
          ${{ secrets.GCE_INSTANCE }}:/tmp/deployment-package.tar.gz \
          --zone=${{ secrets.GCE_ZONE }} \
          --quiet

    - name: Deploy on GCloud VM
      run: |
        gcloud compute ssh ${{ secrets.GCE_INSTANCE }} \
          --zone=${{ secrets.GCE_ZONE }} \
          --quiet \
          --command='bash -s' << 'EOF'
          set -e
          echo "Starting deployment process..."
          
          APP_USER=$(whoami)
          echo "Deploying as user: $APP_USER"
          
          # Stop existing services
          echo "Stopping existing services..."
          sudo systemctl stop aliran-api-server || echo "aliran-api-server not running"
          sudo systemctl stop aliran-whatsapp || echo "aliran-whatsapp not running"
          
          # Create application directory if it doesn't exist
          sudo mkdir -p /opt/aliran-tunai
          sudo chown -R $APP_USER:$APP_USER /opt/aliran-tunai
          cd /opt/aliran-tunai
          
          # Backup current deployment
          if [ -d "current" ]; then
            echo "Backing up current deployment..."
            sudo rm -rf backup || true
            mv current backup
          fi
          
          # Extract new deployment
          echo "Extracting new deployment..."
          mkdir -p current
          cd current
          tar -xzf /tmp/deployment-package.tar.gz
          
          # Install system dependencies (Ubuntu/Debian)
          echo "Installing system dependencies..."
          sudo apt-get update -y
          sudo apt-get install -y \
            python3 python3-pip python3-venv python3-dev \
            build-essential tesseract-ocr tesseract-ocr-eng \
            nginx certbot python3-certbot-nginx
          
          # Setup Python virtual environment
          echo "Setting up Python virtual environment..."
          python3 -m venv venv
          source venv/bin/activate
          pip install --upgrade pip
          pip install -r requirements.txt
          
          # Restore .env from existing backup if available
          if [ -f "/opt/aliran-tunai/backup/.env" ]; then
            echo "Restoring .env from backup..."
            cp /opt/aliran-tunai/backup/.env .env
          fi
          
          # Create log directory
          sudo mkdir -p /var/log/aliran-tunai
          sudo chown -R $APP_USER:$APP_USER /var/log/aliran-tunai
          
          # Update service files with current user
          echo "Setting up systemd services..."
          sed "s/abuhuzaifahbidin/$APP_USER/g" deploy/aliran-api-server.service | sudo tee /etc/systemd/system/aliran-api-server.service > /dev/null
          sed "s/abuhuzaifahbidin/$APP_USER/g" deploy/aliran-whatsapp.service | sudo tee /etc/systemd/system/aliran-whatsapp.service > /dev/null
          
          sudo systemctl daemon-reload
          sudo systemctl enable aliran-api-server aliran-whatsapp
          sudo systemctl start aliran-api-server
          sudo systemctl start aliran-whatsapp
          
          # Wait and verify
          echo "Waiting for services to start..."
          sleep 10
          
          echo "Service status:"
          sudo systemctl is-active aliran-api-server && echo "✅ aliran-api-server running" || echo "❌ aliran-api-server not running"
          sudo systemctl is-active aliran-whatsapp && echo "✅ aliran-whatsapp running" || echo "❌ aliran-whatsapp not running"
          
          # Setup nginx if not configured
          if [ ! -f /etc/nginx/sites-available/aliran-tunai ]; then
            echo "Setting up nginx..."
            sudo cp deploy/nginx.conf /etc/nginx/sites-available/aliran-tunai
            sudo ln -sf /etc/nginx/sites-available/aliran-tunai /etc/nginx/sites-enabled/
            sudo rm -f /etc/nginx/sites-enabled/default
            sudo nginx -t && sudo systemctl reload nginx
          fi
          
          # Cleanup
          rm -f /tmp/deployment-package.tar.gz
          
          echo "✅ Deployment completed successfully!"
        EOF
        
    - name: Post-deployment verification
      if: always()
      run: |
        echo "Running post-deployment verification..."
        sleep 15
        
        gcloud compute ssh ${{ secrets.GCE_INSTANCE }} \
          --zone=${{ secrets.GCE_ZONE }} \
          --quiet \
          --command='
            echo "=== Service Status ==="
            sudo systemctl status aliran-api-server --no-pager -l || true
            sudo systemctl status aliran-whatsapp --no-pager -l || true
            echo ""
            echo "=== Health Check ==="
            curl -sf http://localhost:5001/health && echo "✅ API Server healthy" || echo "⚠️ API Server not responding"
            curl -sf http://localhost:5002/health && echo "✅ WhatsApp service healthy" || echo "⚠️ WhatsApp service not responding"
          '
        
    - name: Notify deployment status
      if: always()
      run: |
        if [ "${{ job.status }}" == "success" ]; then
          echo "✅ Deployment to GCloud successful!"
        else
          echo "❌ Deployment to GCloud failed!"
        fi

  # ============= ROLLBACK JOB =============
  rollback:
    name: Rollback Deployment
    runs-on: ubuntu-latest
    if: failure() && github.ref == 'refs/heads/main'
    needs: [deploy]
    
    steps:
    - name: Authenticate to Google Cloud
      uses: google-github-actions/auth@v2
      with:
        credentials_json: ${{ secrets.GCP_SA_KEY }}

    - name: Set up gcloud CLI
      uses: google-github-actions/setup-gcloud@v2
      with:
        project_id: ${{ secrets.GCP_PROJECT_ID }}

    - name: Rollback on GCloud VM
      run: |
        gcloud compute ssh ${{ secrets.GCE_INSTANCE }} \
          --zone=${{ secrets.GCE_ZONE }} \
          --quiet \
          --command='bash -s' << 'EOF'
          set -e
          echo "Starting rollback process..."
          cd /opt/aliran-tunai
          
          if [ -d "backup" ]; then
            echo "Rolling back to previous version..."
            sudo systemctl stop aliran-api-server || true
            sudo systemctl stop aliran-whatsapp || true
            
            rm -rf current
            mv backup current
            
            cd current
            source venv/bin/activate || (python3 -m venv venv && source venv/bin/activate && pip install -r requirements.txt)
            
            sudo systemctl start aliran-api-server
            sudo systemctl start aliran-whatsapp
            
            echo "✅ Rollback completed!"
          else
            echo "❌ No backup found, cannot rollback!"
            exit 1
          fi
        EOF